<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeeGees - Pattern Preview</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
  }

  .container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #38bdf8;
  }

  h2 {
    text-align: center;
    color: #38bdf8;
  }

  .layout {
    display: grid;
    grid-template-columns: 150px 1fr 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
  }

  .card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
  }

  input[type="number"] {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: none;
  }

  input[type="range"] {
    width: 100%;
  }

  .btn {
    width: 100%;
    padding: 10px;
    background: #38bdf8;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }

  .form-group {
    margin-bottom: 10px;
  }

  svg {
    width: 100%;
    height: 500px;
    background: #0f172a;
    border-radius: 10px;
  }

  /* ✅ MOBILE FIX */
  @media (max-width: 768px) {
    .layout {
      grid-template-columns: 1fr;
    }

    svg {
      height: 500px;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>Pattern Preview</h1>

  <div class="layout">

    <!-- LEFT SIDE -->
    <div>

      <!-- Measurements -->
      <div class="card">
        <h3>Edit Measurements</h3>

        <input type="number" id="waist" placeholder="Waist">
        <input type="number" id="hip" placeholder="Hip">
        <input type="number" id="rise" placeholder="Rise">
        <input type="number" id="outseam" placeholder="Outseam">
        <input type="number" id="inseam" placeholder="Inseam">
        <input type="number" id="thigh" placeholder="Thigh">
        <input type="number" id="knee" placeholder="Knee">
        <input type="number" id="leg_opening" placeholder="Leg Opening">

        <button class="btn" onclick="updatePattern()">Update Pattern</button>
      </div>
    </div>

    <!-- FRONT PART -->
    <div class="card">
      <h2>(FRONT PART)</h2>
      
      <svg id="svgCanvas"></svg>

      
    </div>

    <!-- ADJUSTMENT CONTROLS -->
    <div class="card">
      <div class="card">
        

      </div>
    </div>
    <div>
       <h3>Adjustments</h3>
       <div class="form-group">
          <label>Waist Shift: <span id="waistShiftVal">0</span></label>
          <input type="range" id="waistShift" min="-50" max="50" value="0">
        </div>

        <div class="form-group">
          <label>Hip Shift: <span id="hipShiftVal">0</span></label>
          <input type="range" id="hipShift" min="-50" max="50" value="0">
        </div>

        <div class="form-group">
           <label>Crotch Tip: <span id="crotchVal">0</span></label>
           <input type="range" id="crotchDepth" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Crotch Width: <span id="crotchWidthVal">0</span></label>
           <input type="range" id="crotchWidth" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Front Waist adj: <span id="frontWaistVal">0</label>
           <input type="range" id="frontWaistAdj" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Front Hip adj: <span id="frontHipVal">0</label>
           <input type="range" id="frontHipAdj" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Thigh adj: <span id="thighVal">0</label>
           <input type="range" id="thighAdj" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Knee adj: <span id="kneeVal">0</label>
           <input type="range" id="kneeAdj" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Leg Opening adj: <span id="bottomVal">0</label>
           <input type="range" id="bottomAdj" min="-20" max="20" value="0">
        </div>
    
    </div>
  </div>
</div>

<script>

// Load from URL
const params = new URLSearchParams(window.location.search);

function loadData() {
  document.getElementById("waist").value = params.get("waist") || "";
  document.getElementById("hip").value = params.get("hip") || "";
  document.getElementById("rise").value = params.get("rise") || "";
  document.getElementById("outseam").value = params.get("outseam") || "";
  document.getElementById("inseam").value = params.get("inseam") || "";
  document.getElementById("thigh").value = params.get("thigh") || "";
  document.getElementById("knee").value = params.get("knee") || "";
  document.getElementById("leg_opening").value = params.get("leg_opening") || "";

  updatePattern();
}

// Sliders
const waistSlider = document.getElementById("waistShift");
const hipSlider = document.getElementById("hipShift");
const crotchSlider = document.getElementById("crotchDepth");
const crotchWidthSlider = document.getElementById("crotchWidth"); 
const thighSlider = document.getElementById("thighAdj");
const kneeSlider = document.getElementById("kneeAdj");
const bottomSlider = document.getElementById("bottomAdj");
const frontHipSlider = document.getElementById("frontHipAdj");
const frontWaistSlider = document.getElementById("frontWaistAdj");
                
waistSlider.addEventListener("input", updatePattern);
hipSlider.addEventListener("input", updatePattern);
crotchSlider.addEventListener("input", updatePattern);
crotchWidthSlider.addEventListener("input", updatePattern);
thighSlider.addEventListener("input", updatePattern);
kneeSlider.addEventListener("input", updatePattern);
bottomSlider.addEventListener("input", updatePattern);
frontHipSlider.addEventListener("input", updatePattern);
frontWaistSlider.addEventListener("input", updatePattern);
  
function updatePattern() {
  const m = {
    waist: parseFloat(document.getElementById("waist").value) || 0,
    hip: parseFloat(document.getElementById("hip").value) || 0,
    rise: parseFloat(document.getElementById("rise").value) || 0,
    outseam: parseFloat(document.getElementById("outseam").value) || 0,
    inseam: parseFloat(document.getElementById("inseam").value) || 0,
    thigh: parseFloat(document.getElementById("thigh").value) || 0,
    knee: parseFloat(document.getElementById("knee").value) || 0,
    leg_opening: parseFloat(document.getElementById("leg_opening").value) || 0,

    waist_shift: parseInt(waistSlider.value),
    hip_shift: parseInt(hipSlider.value),
    crotch_depth: parseInt(crotchSlider.value),
    crotch_width: parseInt(crotchWidthSlider.value),
    thigh_adj: parseInt(thighSlider.value),
    knee_adj: parseInt(kneeSlider.value),
    bottom_adj: parseInt(bottomSlider.value),
    frontHip_adj: parseInt(frontHipSlider.value),
    frontWaist_adj: parseInt(frontWaistSlider.value)
  };

  document.getElementById("waistShiftVal").textContent = m.waist_shift;
  document.getElementById("hipShiftVal").textContent = m.hip_shift;
  document.getElementById("crotchVal").textContent = m.crotch_depth;
  document.getElementById("crotchWidthVal").textContent = m.crotch_width;
  document.getElementById("thighVal").textContent = m.thigh_adj;
  document.getElementById("kneeVal").textContent = m.knee_adj;
  document.getElementById("bottomVal").textContent = m.bottom_adj;
  document.getElementById("frontHipVal").textContent = m.frontHip_adj;
  document.getElementById("frontWaistVal").textContent = m.frontWaist_adj;

  drawPattern(m);
}

function drawPattern(m) {
  const svg = document.getElementById("svgCanvas");

  const scale = 10;
  const center = 100;
  

  const waistShift = m.waist_shift;
  const hipShift = m.hip_shift;
  const thighOffset = m.thigh_adj;
  const kneeOffset = m.knee_adj;
  const bottomOffset = m.bottom_adj;
  const hipOffset = m.frontHip_adj;
  const waistOffset = m.frontWaist_adj;

  const Length = m.outseam * scale;
  const waistLine = 50;
  const crotchLine = waistLine + (m.rise * scale);
  const frontHipLine = crotchLine - (2 * scale);
  const thighLine = crotchLine + (4 * scale);
  const kneeLine = crotchLine + (((m.outseam - m.rise) / 2) * scale);
  const bottomLine1 = waistLine + Length;
  const bottomLine0 = bottomLine1 + (2 * scale);

  const Hwaist = (m.waist / 8) * scale;
  const HFhip = (m.hip / 8) * scale;
  const Hthigh = (m.thigh / 4) * scale;
  const Hknee = (m.knee / 4) * scale;
  const Hbottom = (m.leg_opening / 4) * scale;
  const Hcrotch = ((m.hip / 6) + 1) * scale;
  const HRcrotch = (m.hip / 6) * scale;

  const crotchDepth = m.crotch_depth || 0;
  const crotchWidth = m.crotch_width || 0;
    

  
  const p1 = { x: center - Hwaist + waistShift - waistOffset, y: waistLine };
  const p2 = { x: center + Hwaist + waistShift + waistOffset, y: waistLine };

  const p3 = { x: center + HFhip + hipShift + hipOffset, y: frontHipLine };
  const p4 = { x: center + HRcrotch + crotchWidth , y: crotchLine};
  const p5 = { x: center + Hthigh + thighOffset, y: thighLine };
  const p6 = { x: center + Hknee + kneeOffset, y: kneeLine };
  const p7 = { x: center + Hbottom + bottomOffset, y: bottomLine1 };
  const p8 = { x: center + Hbottom + bottomOffset, y: bottomLine0 };
  const p9 = { x: center - Hbottom - bottomOffset, y: bottomLine0 };
  const p10 = { x: center - Hbottom - bottomOffset, y: bottomLine1 };
  const p11 = { x: center - Hknee - kneeOffset, y: kneeLine };
  const p12 = { x: center - Hthigh - thighOffset, y: thighLine };
  // adjust crotch point
  const p13 = { x: center - Hcrotch - crotchDepth, y: crotchLine};
  const p14 = { x: center - HFhip + hipShift - hipOffset, y: frontHipLine };

  const path = `
    M ${p1.x} ${p1.y}
    L ${p2.x} ${p2.y}
    Q ${p3.x} ${p3.y} ${p4.x} ${p4.y}
    Q ${p4.x} ${p4.y} ${p5.x} ${p5.y}
    L ${p6.x} ${p6.y}
    L ${p7.x} ${p7.y}
    L ${p8.x} ${p8.y}
    L ${p9.x} ${p9.y}
    L ${p10.x} ${p10.y}
    L ${p11.x} ${p11.y}
    L ${p12.x} ${p12.y}
    L ${p13.x} ${p13.y}
    L ${p14.x} ${p14.y}
    Z
  `;
  const topY = 0;
  const bottomY = bottomLine0 + 20; // konting allowance
  const waistLineXo = 0;
  const waistLineXi = 300;
  const frontHipLineXo = 0;
  const frontHipLineXi = 300;
  const crotchLineXo = 0;
  const crotchLineXi = 300;
  const thighLineXo = 0;
  const thighLineXi = 300;
  const kneeLineXo = 0;
  const kneeLineXi = 300;
  const bottomLine1Xo = 0; 
  const bottomLine1Xi = 300;
  const bottomLine0Xo = 0; 
  const bottomLine0Xi = 300;
  
  //DISTANCE FROM CENTER TO WAIST END-POINTS 
  const waistCenterPoint = { x: center, y: waistLine };
  //LEFT END-POINT 
  const Lwaist = { x: center - Hwaist + waistShift - waistOffset, y: waistLine };
  const LwmidX = (waistCenterPoint.x + Lwaist.x) / 2;
  const LwmidY = (waistCenterPoint.y + Lwaist.y) / 2;
  const Lwdx = Lwaist.x - waistCenterPoint.x;
  const Lwdy = Lwaist.y - waistCenterPoint.y;
  const Lwdistance = Math.sqrt(Lwdx * Lwdx + Lwdy * Lwdy) / scale;

  //RIGHT END-POINT 
  const Rwaist = { x: center + Hwaist + waistShift + waistOffset, y: waistLine };
  const RwmidX = (waistCenterPoint.x + Rwaist.x) / 2;
  const RwmidY = (waistCenterPoint.y + Rwaist.y) / 2;
  const Rwdx = Rwaist.x - waistCenterPoint.x;
  const Rwdy = Rwaist.y - waistCenterPoint.y;
  const Rwdistance = Math.sqrt(Rwdx * Rwdx + Rwdy * Rwdy) / scale;

  //DISTANCE FROM CENTER TO FRONTHIP END-POINTS 
  const frontHipCenterPoint = { x: center, y: frontHipLine };
  //LEFT END-POINT 
  const Lhip = { x: center - HFhip + hipShift - hipOffset, y: frontHipLine };
  const LhmidX = (frontHipCenterPoint.x + Lhip.x) / 2;
  const LhmidY = (frontHipCenterPoint.y + Lhip.y) / 2;
  const Lhdx = Lhip.x - frontHipCenterPoint.x;
  const Lhdy = Lhip.y - frontHipCenterPoint.y;
  const Lhdistance = Math.sqrt(Lhdx * Lhdx + Lhdy * Lhdy) / scale;

  //RIGHT END-POINT 
  const Rhip = { x: center + HFhip + hipShift + hipOffset, y: frontHipLine };
  const RhmidX = (frontHipCenterPoint.x + Rhip.x) / 2;
  const RhmidY = (frontHipCenterPoint.y + Rhip.y) / 2;
  const Rhdx = Rhip.x - frontHipCenterPoint.x;
  const Rhdy = Rhip.y - frontHipCenterPoint.y;
  const Rhdistance = Math.sqrt(Rhdx * Rhdx + Rhdy * Rhdy) / scale;
 
  //CROTCH TIP computation 
  const crotchCenterPoint = { x: center, y: crotchLine };
  //LEFT + CROTCHTIP +- CROTCHDEPTH
  const Lcrotch = { x: center - Hcrotch - crotchDepth, y: crotchLine };
  const LcmidX = (crotchCenterPoint.x + Lcrotch.x) / 2;
  const LcmidY = (crotchCenterPoint.y + Lcrotch.y) / 2;
  const Lcdx = Lcrotch.x - crotchCenterPoint.x;
  const Lcdy = Lcrotch.y - crotchCenterPoint.y;
  const Lcdistance = Math.sqrt(Lcdx * Lcdx + Lcdy * Lcdy) / scale;

  //RIGHT
  const Rcrotch = { x: center + HRcrotch + crotchWidth, y: crotchLine };
  const RcmidX = (crotchCenterPoint.x + Rcrotch.x) / 2;
  const RcmidY = (crotchCenterPoint.y + Rcrotch.y) / 2;
  const Rcdx = Rcrotch.x - crotchCenterPoint.x;
  const Rcdy = Rcrotch.y - crotchCenterPoint.y;
  const Rcdistance = Math.sqrt(Rcdx * Rcdx + Rcdy * Rcdy) / scale;

  //DISTANCE FROM CENTER TO FRONT THIGH END-POINTS 
  const frontThighCenterPoint = { x: center, y: thighLine };
  //LEFT END-POINT 
  const Lthigh = { x: center - Hthigh - thighOffset, y: thighLine };
  const LtmidX = (frontThighCenterPoint.x + Lthigh.x) / 2;
  const LtmidY = (frontThighCenterPoint.y + Lthigh.y) / 2;
  const Ltdx = Lthigh.x - frontThighCenterPoint.x;
  const Ltdy = Lthigh.y - frontThighCenterPoint.y;
  const Ltdistance = Math.sqrt(Ltdx * Ltdx + Ltdy * Ltdy) / scale;

  //RIGHT END-POINT 
  const Rthigh = { x: center + Hthigh + thighOffset, y: thighLine };
  const RtmidX = (frontThighCenterPoint.x + Rthigh.x) / 2;
  const RtmidY = (frontThighCenterPoint.y + Rthigh.y) / 2;
  const Rtdx = Rthigh.x - frontThighCenterPoint.x;
  const Rtdy = Rthigh.y - frontThighCenterPoint.y;
  const Rtdistance = Math.sqrt(Rtdx * Rtdx + Rtdy * Rtdy) / scale;
 
  svg.innerHTML = 
  `
  <line 
    x1="${center}" 
    y1="${topY}" 
    x2="${center}" 
    y2="${bottomY}" 
    stroke="red"
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${waistLineXo}" 
    y1="${waistLine}" 
    x2="${waistLineXi}" 
    y2="${waistLine}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${frontHipLineXo}" 
    y1="${frontHipLine}" 
    x2="${frontHipLineXi}" 
    y2="${frontHipLine}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${crotchLineXo}" 
    y1="${crotchLine}" 
    x2="${crotchLineXi}" 
    y2="${crotchLine}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
    <line 
    x1="${thighLineXo}" 
    y1="${thighLine}" 
    x2="${thighLineXi}" 
    y2="${thighLine}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${kneeLineXo}" 
    y1="${kneeLine}" 
    x2="${kneeLineXi}" 
    y2="${kneeLine}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${bottomLine1Xo}" 
    y1="${bottomLine1}" 
    x2="${bottomLine1Xi}" 
    y2="${bottomLine1}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${bottomLine0Xo}" 
    y1="${bottomLine0}" 
    x2="${bottomLine0Xi}" 
    y2="${bottomLine0}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />

  <path 
    d="${path}" 
    fill="none" 
    stroke="#38bdf8" 
    stroke-width="2"
  />
  <text x="${LwmidX}" y="${LwmidY}" fill="yellow" font-size="12">
    ${Lwdistance.toFixed(1)} "
  </text>
  <text x="${RwmidX}" y="${RwmidY}" fill="yellow" font-size="12">
    ${Rwdistance.toFixed(1)} "
  </text>
  <text x="${LhmidX}" y="${LhmidY}" fill="yellow" font-size="12">
    ${Lhdistance.toFixed(1)} "
  </text>
  <text x="${RhmidX}" y="${RhmidY}" fill="yellow" font-size="12">
    ${Rhdistance.toFixed(1)} "
  </text>
  <text x="${LcmidX}" y="${LcmidY}" fill="yellow" font-size="12">
    ${Lcdistance.toFixed(1)} "
  </text>
  <text x="${RcmidX}" y="${RcmidY}" fill="yellow" font-size="12">
    ${Rcdistance.toFixed(1)} "
  </text>
  <text x="${LtmidX}" y="${LtmidY}" fill="yellow" font-size="12">
    ${Ltdistance.toFixed(1)} "
  </text>
  <text x="${RtmidX}" y="${RtmidY}" fill="yellow" font-size="12">
    ${Rtdistance.toFixed(1)} "
  </text>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="white" />
    </marker>
  </defs>

  <line 
    x1="${waistCenterPoint.x}" 
    y1="${waistCenterPoint.y}" 
    x2="${Lwaist.x}" 
    y2="${Lwaist.y}"  
    stroke="white"
    stroke-width="0.5"
    marker-start="url(#arrow)"
    marker-end="url(#arrow)"
  />
  <line 
    x1="${waistCenterPoint.x}" 
    y1="${waistCenterPoint.y}" 
    x2="${Rwaist.x}" 
    y2="${Rwaist.y}"  
    stroke="white"
    stroke-width="0.5"
    marker-start="url(#arrow)"
    marker-end="url(#arrow)"
  />
  <line 
    x1="${frontHipCenterPoint.x}" 
    y1="${frontHipCenterPoint.y}" 
    x2="${Lhip.x}" 
    y2="${Lhip.y}"  
    stroke="white"
    stroke-width="0.5"
    marker-start="url(#arrow)"
    marker-end="url(#arrow)"
  />
  <line 
    x1="${frontHipCenterPoint.x}" 
    y1="${frontHipCenterPoint.y}" 
    x2="${Rhip.x}" 
    y2="${Rhip.y}"  
    stroke="white"
    stroke-width="0.5"
    marker-start="url(#arrow)"
    marker-end="url(#arrow)"
  />
  <line 
    x1="${crotchCenterPoint.x}" 
    y1="${crotchCenterPoint.y}" 
    x2="${Lcrotch.x}" 
    y2="${Lcrotch.y}"  
    stroke="white"
    stroke-width="0.5"
    marker-start="url(#arrow)"
    marker-end="url(#arrow)"
  />
  <line 
    x1="${crotchCenterPoint.x}" 
    y1="${crotchCenterPoint.y}" 
    x2="${Rcrotch.x}" 
    y2="${Rcrotch.y}"  
    stroke="white"
    stroke-width="0.5"
    marker-start="url(#arrow)"
    marker-end="url(#arrow)"
  />
  <line 
    x1="${frontThighCenterPoint.x}" 
    y1="${frontThighCenterPoint.y}" 
    x2="${Lthigh.x}" 
    y2="${Lthigh.y}"  
    stroke="white"
    stroke-width="0.5"
    marker-start="url(#arrow)"
    marker-end="url(#arrow)"
  />
  <line 
    x1="${frontThighCenterPoint.x}" 
    y1="${frontThighCenterPoint.y}" 
    x2="${Rthigh.x}" 
    y2="${Rthigh.y}"  
    stroke="white"
    stroke-width="0.5"
    marker-start="url(#arrow)"
    marker-end="url(#arrow)"
  />
`; }
  // init
loadData();

</script>

</body>
</html>
