<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeeGees - Pattern Preview</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
  }

  .container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #38bdf8;
  }

  h2 {
    text-align: center;
    color: #38bdf8;
  }

  .layout {
    display: grid;
    grid-template-columns: 150px 1fr 1fr 1fr;
    gap: 20px;
    margin-top: 20px;
  }

  .card {
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
  }

  input[type="number"] {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border-radius: 5px;
    border: none;
  }

  input[type="range"] {
    width: 100%;
  }

  .btn {
    width: 100%;
    padding: 10px;
    background: #38bdf8;
    border: none;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }

  .form-group {
    margin-bottom: 10px;
  }

  svg {
    width: 100%;
    height: 500px;
    background: #0f172a;
    border-radius: 10px;
  }

  /* ✅ MOBILE FIX */
  @media (max-width: 768px) {
    .layout {
      grid-template-columns: 1fr;
    }

    svg {
      height: 500px;
    }
  }
</style>
</head>

<body>

<div class="container">
  <h1>Pattern Preview</h1>

  <div class="layout">

    <!-- LEFT SIDE -->
    <div>

      <!-- Measurements -->
      <div class="card">
        <h3>Edit Measurements</h3>

        <input type="number" id="waist" placeholder="Waist">
        <input type="number" id="hip" placeholder="Hip">
        <input type="number" id="rise" placeholder="Rise">
        <input type="number" id="outseam" placeholder="Outseam">
        <input type="number" id="inseam" placeholder="Inseam">
        <input type="number" id="thigh" placeholder="Thigh">
        <input type="number" id="knee" placeholder="Knee">
        <input type="number" id="leg_opening" placeholder="Leg Opening">

        <button class="btn" onclick="updatePattern()">Update Pattern</button>
      </div>
    </div>

    <!-- FRONT PART -->
    <div class="card">
      <h2>(FRONT PART)</h2>
      <svg id="svgCanvasFront"></svg> 
    </div>

    <!-- FRONT & BACK PART -->
    <div class="card">
      <h2>(W/BACK PART)</h2>
      <svg id="svgCanvasBack"></svg> 
    </div>

    <!-- ADJUSTMENT CONTROLS -->
    <div>
       <h3>Adjustments</h3>
      <div class="form-group">
          <label>Back Waist Height: <span id="backHipLineVal">0</span></label>
          <input type="range" id="backWaistUpShift" min="-50" max="50" value="0">
      </div>
      
       <div class="form-group">
          <label>Waist Shift: <span id="waistShiftVal">0</span></label>
          <input type="range" id="waistShift" min="-50" max="50" value="0">
        </div>

        <div class="form-group">
          <label>Hip Shift: <span id="hipShiftVal">0</span></label>
          <input type="range" id="hipShift" min="-50" max="50" value="0">
        </div>

        <div class="form-group">
           <label>Crotch Shift: <span id="crotchShiftVal">0</span></label>
           <input type="range" id="crotchShift" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Crotch Tip: <span id="crotchVal">0</span></label>
           <input type="range" id="crotchDepth" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Front Waist adj: <span id="frontWaistVal">0</label>
           <input type="range" id="frontWaistAdj" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Front Hip adj: <span id="frontHipVal">0</label>
           <input type="range" id="frontHipAdj" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Thigh adj: <span id="thighVal">0</label>
           <input type="range" id="thighAdj" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Knee adj: <span id="kneeVal">0</label>
           <input type="range" id="kneeAdj" min="-20" max="20" value="0">
        </div>

        <div class="form-group">
           <label>Leg Opening adj: <span id="bottomVal">0</label>
           <input type="range" id="bottomAdj" min="-20" max="20" value="0">
        </div>
    
    </div>
  </div>
</div>

  <div id="debugPanel" style="
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-height: 180px;
  overflow-y: auto;
  background: black;
  color: #00ff00;
  font-size: 12px;
  padding: 5px;
  z-index: 9999;
  font-family: monospace;
">
  <b>DEBUG:</b><br>
</div>

<script>

window.onerror = function (message, source, lineno, colno, error) {
  debug("❌ ERROR: " + message);
  debug("📄 File: " + source);
  debug("📍 Line: " + lineno + ":" + colno);

  if (error && error.stack) {
    debug("📚 Stack: " + error.stack);
  }

  return true; // para hindi na default browser error lang
};

function debug(msg) {
  const panel = document.getElementById("debugPanel");
  if (panel) {
    panel.innerHTML += msg + "<br>";
    panel.scrollTop = panel.scrollHeight;
  }
}

// Load from URL
  debug("params");
const params = new URLSearchParams(window.location.search);

function loadData() {
  debug("loadData");
  document.getElementById("waist").value = params.get("waist") || "";
  document.getElementById("hip").value = params.get("hip") || "";
  document.getElementById("rise").value = params.get("rise") || "";
  document.getElementById("outseam").value = params.get("outseam") || "";
  document.getElementById("inseam").value = params.get("inseam") || "";
  document.getElementById("thigh").value = params.get("thigh") || "";
  document.getElementById("knee").value = params.get("knee") || "";
  document.getElementById("leg_opening").value = params.get("leg_opening") || "";

 updatePattern();
}

// Sliders
const backWaistSlider = document.getElementById("backWaistUpShift");
const waistSlider = document.getElementById("waistShift");
const hipSlider = document.getElementById("hipShift");
const crotchShiftSlider = document.getElementById("crotchShift");
const crotchSlider = document.getElementById("crotchDepth");
const thighSlider = document.getElementById("thighAdj");
const kneeSlider = document.getElementById("kneeAdj");
const bottomSlider = document.getElementById("bottomAdj");
const frontHipSlider = document.getElementById("frontHipAdj");
const frontWaistSlider = document.getElementById("frontWaistAdj");
                
backWaistSlider.addEventListener("input", updatePattern);
waistSlider.addEventListener("input", updatePattern);
hipSlider.addEventListener("input", updatePattern);
crotchShiftSlider.addEventListener("input", updatePattern);
crotchSlider.addEventListener("input", updatePattern);
thighSlider.addEventListener("input", updatePattern);
kneeSlider.addEventListener("input", updatePattern);
bottomSlider.addEventListener("input", updatePattern);
frontHipSlider.addEventListener("input", updatePattern);
frontWaistSlider.addEventListener("input", updatePattern);

function getPointAtDistance(p1, y2, d, side = "left") {
  const dy = y2 - p1.y;
  const dx = Math.sqrt(d * d - dy * dy);

  return {
    x: side === "right" ? p1.x + dx : p1.x - dx,
    y: y2
  };
}

function getPointAtY(p1, p2, y) 
{
   const t = (y - p1.y) / (p2.y - p1.y);

   return {
     x: p1.x + (p2.x - p1.x) * t,
     y: y
   };
}
//Usage of function getPointAyY(p1, p2, y)
  //const p1 = { x: 50, y: 50 };
  //const p2 = { x: 10, y: 100 };

  //const px = getPointAtY(p1, p2, 75);

function getPointAtX(p1, p2, x) 
{
   const t = (x - p1.x) / (p2.x - p1.x);

   return {
     x: x,
     y: p1.y + (p2.y - p1.y) * t,
   };
}
  //Usage of function getPointAyY(p1, p2, y)
  //const p1 = { x: 50, y: 50 };
  //const p2 = { x: 10, y: 100 };

  //const px = getPointAtY(p1, p2, 75);

  function updatePattern() {
  const m = {
    waist: parseFloat(document.getElementById("waist").value) || 0,
    hip: parseFloat(document.getElementById("hip").value) || 0,
    rise: parseFloat(document.getElementById("rise").value) || 0,
    outseam: parseFloat(document.getElementById("outseam").value) || 0,
    inseam: parseFloat(document.getElementById("inseam").value) || 0,
    thigh: parseFloat(document.getElementById("thigh").value) || 0,
    knee: parseFloat(document.getElementById("knee").value) || 0,
    leg_opening: parseFloat(document.getElementById("leg_opening").value) || 0,

    backWaist_up: parseInt(backWaistSlider.value),
    waist_shift: parseInt(waistSlider.value),
    hip_shift: parseInt(hipSlider.value),
    crotch_shift: parseInt(crotchShiftSlider.value),
    crotch_depth: parseInt(crotchSlider.value),
    thigh_adj: parseInt(thighSlider.value),
    knee_adj: parseInt(kneeSlider.value),
    bottom_adj: parseInt(bottomSlider.value),
    frontHip_adj: parseInt(frontHipSlider.value),
    frontWaist_adj: parseInt(frontWaistSlider.value)
  };

  document.getElementById("backHipLineVal").textContent = m.backWaist_up;
  document.getElementById("waistShiftVal").textContent = m.waist_shift;
  document.getElementById("hipShiftVal").textContent = m.hip_shift;
  document.getElementById("crotchShiftVal").textContent = m.crotch_shift;
  document.getElementById("crotchVal").textContent = m.crotch_depth;
  document.getElementById("thighVal").textContent = m.thigh_adj;
  document.getElementById("kneeVal").textContent = m.knee_adj;
  document.getElementById("bottomVal").textContent = m.bottom_adj;
  document.getElementById("frontHipVal").textContent = m.frontHip_adj;
  document.getElementById("frontWaistVal").textContent = m.frontWaist_adj;

 drawPattern(m);
  } 
  
function drawPattern(m) {
  
  const svgFront = document.getElementById("svgCanvasFront");
  const svgBack = document.getElementById("svgCanvasBack");

  const scale = 10;
  const center = 100;
  
  const backWaistUp = m.backWaist_up;
  const waistShift = m.waist_shift;
  const frontHipShift = m.hip_shift;
  const crotchShift = m.crotch_shift;
  const thighOffset = m.thigh_adj;
  const kneeOffset = m.knee_adj;
  const bottomOffset = m.bottom_adj;
  const hipOffset = m.frontHip_adj;
  const waistOffset = m.frontWaist_adj;
  const Length = m.outseam * scale;
  const frontWaistLine = 50;
  const crotchLine = frontWaistLine + ((m.rise - 1) * scale);
  const frontHipLine = crotchLine - (2 * scale);
  const thighLine = crotchLine + (4 * scale);
  const kneeLine = crotchLine + (((m.outseam - m.rise) / 2) * scale);
  const bottomLine1 = frontWaistLine + (Length - scale);
  const bottomLine0 = bottomLine1 + (2 * scale);

  const Hwaist = (m.waist / 8) * scale;
  const BHwaist = ((m.waist / 2) * scale) - (Hwaist * 2) + (2 * scale);
  const HFhip = (m.hip / 8) * scale;
  const BHhip = ((m.hip / 2) * scale) - (HFhip * 2) + (1.5 * scale);
  const Hthigh = (m.thigh / 4) * scale;
  const Hknee = (m.knee / 4) * scale;
  const Hbottom = (m.leg_opening / 4) * scale;
  const Hcrotch = ((m.hip / 6) + 1) * scale;
  const HRcrotch = (m.hip / 6) * scale;

  const crotchDepth = m.crotch_depth || 0;
      
  ////////FRONT PATTERN DRAWING////////////////
  
  const fp1 = { x: center + waistShift - waistOffset, y: frontWaistLine };
  const fp2 = { x: center + Hwaist + waistShift + waistOffset + (Hwaist - (3 * scale)), y: frontWaistLine };
  const fp3 = { x: center + Hthigh + frontHipShift + thighOffset, y: frontHipLine };
  const fp4 = { x: center + Hthigh + thighOffset + crotchShift, y: crotchLine};
  const fp5 = { x: center + Hthigh + thighOffset - (0.125 * scale), y: thighLine };
  const fp6 = { x: center + Hknee + kneeOffset - (0.125 * scale), y: kneeLine };
  const fp7 = { x: center + Hbottom + bottomOffset, y: bottomLine1 };
  const fp8 = { x: center + Hbottom + bottomOffset, y: bottomLine0 };
  const fp9 = { x: center - Hbottom - bottomOffset, y: bottomLine0 };
  const fp10 = { x: center - Hbottom - bottomOffset, y: bottomLine1 };
  const fp11 = { x: center - Hknee - kneeOffset, y: kneeLine };
  const fp12 = { x: center - Hthigh - thighOffset, y: thighLine };
  // adjust crotch point
  const fp13 = { x: center - Hcrotch - crotchDepth + crotchShift, y: crotchLine};
  const fp14 = { x: center - HFhip + frontHipShift - hipOffset - (HFhip - Hthigh), y: frontHipLine };
  const fp15 = { x: center - (3 * scale) + waistShift, y: frontWaistLine };

  const fpath = `
    M ${fp1.x} ${fp1.y}
    L ${fp2.x} ${fp2.y}
    Q ${fp3.x} ${fp3.y} ${fp4.x} ${fp4.y}
    Q ${fp4.x} ${fp4.y} ${fp5.x} ${fp5.y}
    L ${fp6.x} ${fp6.y}
    L ${fp7.x} ${fp7.y}
    L ${fp8.x} ${fp8.y}
    L ${fp9.x} ${fp9.y}
    L ${fp10.x} ${fp10.y}
    Q ${fp11.x} ${fp11.y} ${fp12.x} ${fp12.y}
    Q ${fp12.x} ${fp12.y} ${fp13.x} ${fp13.y}
    L ${fp14.x} ${fp14.y}
    L ${fp15.x} ${fp15.y}
    Z
  `;
  
  
  
  const topY = 0;
  const bottomY = bottomLine0 + 20; // konting allowance
  const waistLineXo = 0;
  const waistLineXi = 300;
  const frontHipLineXo = 0;
  const frontHipLineXi = 300;
  const crotchLineXo = 0;
  const crotchLineXi = 300;
  const thighLineXo = 0;
  const thighLineXi = 300;
  const kneeLineXo = 0;
  const kneeLineXi = 300;
  const bottomLine1Xo = 0; 
  const bottomLine1Xi = 300;
  const bottomLine0Xo = 0; 
  const bottomLine0Xi = 300;
  
  
  //DISTANCE FROM WAIST TO HIP END-POINTS 
  const waistToHipCenterPoint = frontWaistLine + ((frontHipLine - frontWaistLine) / 2);
  const hipY = (frontHipLine - frontWaistLine) / scale;
                
  //DISTANCE FROM CENTER TO WAIST END-POINTS 
  const waistCenterPoint = { x: center, y: frontWaistLine };
  //LEFT END-POINT 
  const Lwaist = { x: center - (3 * scale) + waistShift, y: frontWaistLine };
  const LwmidX = (waistCenterPoint.x + Lwaist.x) / 2;
  const LwmidY = (waistCenterPoint.y + Lwaist.y) / 2;
  const Lwdx = Lwaist.x - waistCenterPoint.x;
  const Lwdy = Lwaist.y - waistCenterPoint.y;
  const Lwdistance = Math.sqrt(Lwdx * Lwdx + Lwdy * Lwdy) / scale;

  //RIGHT END-POINT 
  const Rwaist = { x: center + Hwaist + waistShift + waistOffset + (Hwaist - (3 * scale)), y: frontWaistLine };
  const RwmidX = (waistCenterPoint.x + Rwaist.x) / 2;
  const RwmidY = (waistCenterPoint.y + Rwaist.y) / 2;
  const Rwdx = Rwaist.x - waistCenterPoint.x;
  const Rwdy = Rwaist.y - waistCenterPoint.y;
  const Rwdistance = Math.sqrt(Rwdx * Rwdx + Rwdy * Rwdy) / scale;

  //DISTANCE FROM CENTER TO FRONTHIP END-POINTS 
  const frontHipCenterPoint = { x: center, y: frontHipLine };
  //LEFT END-POINT 
  const Lhip = { x: center - HFhip + frontHipShift - hipOffset - (HFhip - Hthigh), y: frontHipLine };
  const LhmidX = (frontHipCenterPoint.x + Lhip.x) / 2;
  const LhmidY = (frontHipCenterPoint.y + Lhip.y) / 2;
  const Lhdx = Lhip.x - frontHipCenterPoint.x;
  const Lhdy = Lhip.y - frontHipCenterPoint.y;
  const Lhdistance = Math.sqrt(Lhdx * Lhdx + Lhdy * Lhdy) / scale;

  //RIGHT END-POINT 
  const Rhip = { x: center + Hthigh + frontHipShift + thighOffset, y: frontHipLine };
  const RhmidX = (frontHipCenterPoint.x + Rhip.x) / 2;
  const RhmidY = (frontHipCenterPoint.y + Rhip.y) / 2;
  const Rhdx = Rhip.x - frontHipCenterPoint.x;
  const Rhdy = Rhip.y - frontHipCenterPoint.y;
  const Rhdistance = Math.sqrt(Rhdx * Rhdx + Rhdy * Rhdy) / scale;
 
  //CROTCH TIP computation 
  const frontCrotchCenterPoint = { x: center, y: crotchLine };
  //LEFT + CROTCHTIP +- CROTCHDEPTH
  const Lcrotch = { x: center - Hcrotch - crotchDepth + crotchShift, y: crotchLine };
  const LcmidX = (frontCrotchCenterPoint.x + Lcrotch.x) / 2;
  const LcmidY = (frontCrotchCenterPoint.y + Lcrotch.y) / 2;
  const Lcdx = Lcrotch.x - frontCrotchCenterPoint.x;
  const Lcdy = Lcrotch.y - frontCrotchCenterPoint.y;
  const Lcdistance = Math.sqrt(Lcdx * Lcdx + Lcdy * Lcdy) / scale;

  //RIGHT
  const Rcrotch = { x: center + Hthigh + thighOffset + crotchShift, y: crotchLine};
  const RcmidX = (frontCrotchCenterPoint.x + Rcrotch.x) / 2;
  const RcmidY = (frontCrotchCenterPoint.y + Rcrotch.y) / 2;
  const Rcdx = Rcrotch.x - frontCrotchCenterPoint.x;
  const Rcdy = Rcrotch.y - frontCrotchCenterPoint.y;
  const Rcdistance = Math.sqrt(Rcdx * Rcdx + Rcdy * Rcdy) / scale;

  //DISTANCE FROM CENTER TO FRONT THIGH END-POINTS 
  const frontThighCenterPoint = { x: center, y: thighLine };
  //LEFT END-POINT 
  const Lthigh = { x: center - Hthigh - thighOffset, y: thighLine };
  const LtmidX = (frontThighCenterPoint.x + Lthigh.x) / 2;
  const LtmidY = (frontThighCenterPoint.y + Lthigh.y) / 2;
  const Ltdx = Lthigh.x - frontThighCenterPoint.x;
  const Ltdy = Lthigh.y - frontThighCenterPoint.y;
  const Ltdistance = Math.sqrt(Ltdx * Ltdx + Ltdy * Ltdy) / scale;

  //RIGHT END-POINT 
  const Rthigh = { x: center + Hthigh + thighOffset, y: thighLine };
  const RtmidX = (frontThighCenterPoint.x + Rthigh.x) / 2;
  const RtmidY = (frontThighCenterPoint.y + Rthigh.y) / 2;
  const Rtdx = Rthigh.x - frontThighCenterPoint.x;
  const Rtdy = Rthigh.y - frontThighCenterPoint.y;
  const Rtdistance = Math.sqrt(Rtdx * Rtdx + Rtdy * Rtdy) / scale;

  //DISTANCE FROM CENTER TO FRONT KNEE END-POINTS 
  const frontkneeCenterPoint = { x: center, y: kneeLine };
  //LEFT END-POINT 
  const Lknee = { x: center - Hknee - kneeOffset, y: kneeLine };
  const LkmidX = (frontkneeCenterPoint.x + Lknee.x) / 2;
  const LkmidY = (frontkneeCenterPoint.y + Lknee.y) / 2;
  const Lkdx = Lknee.x - frontkneeCenterPoint.x;
  const Lkdy = Lknee.y - frontkneeCenterPoint.y;
  const Lkdistance = Math.sqrt(Lkdx * Lkdx + Lkdy * Lkdy) / scale;

  //RIGHT END-POINT 
  const Rknee = { x: center + Hknee + kneeOffset, y: kneeLine };
  const RkmidX = (frontkneeCenterPoint.x + Rknee.x) / 2;
  const RkmidY = (frontkneeCenterPoint.y + Rknee.y) / 2;
  const Rkdx = Rknee.x - frontkneeCenterPoint.x;
  const Rkdy = Rknee.y - frontkneeCenterPoint.y;
  const Rkdistance = Math.sqrt(Rkdx * Rkdx + Rkdy * Rkdy) / scale;

  //DISTANCE FROM CENTER TO FRONT LEG-OPENING END-POINTS 
  const frontBottomCenterPoint = { x: center, y: bottomLine0 };
  //LEFT END-POINT 
  const Lbottom = { x: center - Hbottom - bottomOffset, y: bottomLine0 };
  const LbmidX = (frontBottomCenterPoint.x + Lbottom.x) / 2;
  const LbmidY = (frontBottomCenterPoint.y + Lbottom.y) / 2;
  const Lbdx = Lbottom.x - frontBottomCenterPoint.x;
  const Lbdy = Lbottom.y - frontBottomCenterPoint.y;
  const Lbdistance = Math.sqrt(Lbdx * Lbdx + Lbdy * Lbdy) / scale;

  //RIGHT END-POINT 
  const Rbottom = { x: center + Hbottom + bottomOffset, y: bottomLine0 };
  const RbmidX = (frontBottomCenterPoint.x + Rbottom.x) / 2;
  const RbmidY = (frontBottomCenterPoint.y + Rbottom.y) / 2;
  const Rbdx = Rbottom.x - frontBottomCenterPoint.x;
  const Rbdy = Rbottom.y - frontBottomCenterPoint.y;
  const Rbdistance = Math.sqrt(Rbdx * Rbdx + Rbdy * Rbdy) / scale;
 
  svgFront.innerHTML = 
  `
  <line 
    x1="${center}" 
    y1="${topY}" 
    x2="${center}" 
    y2="${bottomY}" 
    stroke="white"
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${waistLineXo}" 
    y1="${frontWaistLine}" 
    x2="${waistLineXi}" 
    y2="${frontWaistLine}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${frontHipLineXo}" 
    y1="${frontHipLine}" 
    x2="${frontHipLineXi}" 
    y2="${frontHipLine}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${crotchLineXo}" 
    y1="${crotchLine}" 
    x2="${crotchLineXi}" 
    y2="${crotchLine}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
    <line 
    x1="${thighLineXo}" 
    y1="${thighLine}" 
    x2="${thighLineXi}" 
    y2="${thighLine}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${kneeLineXo}" 
    y1="${kneeLine}" 
    x2="${kneeLineXi}" 
    y2="${kneeLine}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${bottomLine1Xo}" 
    y1="${bottomLine1}" 
    x2="${bottomLine1Xi}" 
    y2="${bottomLine1}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  <line 
    x1="${bottomLine0Xo}" 
    y1="${bottomLine0}" 
    x2="${bottomLine0Xi}" 
    y2="${bottomLine0}" 
    stroke="red" 
    stroke-width="1"
    stroke-dasharray="5,5"
  />
  
  <path 
    d="${fpath}" 
    fill="none" 
    stroke="#38bdf8" 
    stroke-width="2"
  />

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="white" />
    </marker>
  </defs>

  <line 
    x1="${waistCenterPoint.x}"
