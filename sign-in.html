<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeeGees - Sign In</title>

<style>
  * {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    background: linear-gradient(135deg, #1e1e2f, #2a2a40);
    color: #fff;
  }

  .container {
    margin: auto;
    width: 100%;
    max-width: 380px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  }

  h2 {
    margin-bottom: 10px;
  }

  p {
    margin-top: 0;
    color: #aaa;
    font-size: 14px;
  }

  .form-group {
    margin-top: 20px;
  }

  input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-top: 5px;
    background: rgba(255,255,255,0.1);
    color: #fff;
  }

  input::placeholder {
    color: #ccc;
  }

  button {
    width: 100%;
    margin-top: 25px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #6c63ff;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: #5750d6;
  }

  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
  }

  .footer a {
    color: #6c63ff;
    text-decoration: none;
  }

</style>

</head>

<body>

<div class="container">
  <h2>Welcome Back 👋</h2>
  <p>Sign in to continue to DeeGees</p>

  <div class="form-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter your email">
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password">
  </div>

<button onclick="login()">Sign In</button>

  <div class="footer">
    Don’t have an account? <a href="signup.html">Sign up</a>
  </div>
</div>

<script>
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  // TEMPORARY (palitan natin ito ng Firebase later)
  if (email && password) {
   // alert("Login success (demo)");
    window.location.href = "pattern-preview.html";
  } else {
    alert("Please enter email and password");
  }
}
</script>

</body>
</html>
